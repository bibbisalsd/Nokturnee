<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plugins — Nokturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    .plugins-wrap{display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start;padding-top:24px;padding-bottom:80px;}
    @media(max-width:900px){.plugins-wrap{grid-template-columns:1fr;}}
    .sidebar-panel{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));overflow:hidden;margin-bottom:12px;position:sticky;top:calc(var(--nav-height) + 20px);}
    .sidebar-panel__hd{padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);}
    .filter-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border:none;border-bottom:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s;}
    .filter-btn:last-child{border-bottom:none;}
    .filter-btn:hover{background:var(--bg-elevated);color:var(--text);}
    .filter-btn.active{background:var(--violet-faint);color:var(--violet);border-left:2px solid var(--violet);padding-left:12px;}
    .filter-btn__dot{width:6px;height:6px;border-radius:50%;background:var(--border-mid);flex-shrink:0;transition:background .15s;}
    .filter-btn.active .filter-btn__dot{background:var(--violet);box-shadow:0 0 6px var(--violet-dim);}
    .wallet-mini{background:var(--bg-surface);border:1px solid var(--border-mid);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));padding:14px;margin-bottom:12px;}
    .wallet-mini__label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:4px;}
    .wallet-mini__balance{font-family:var(--font-display);font-size:32px;letter-spacing:0.06em;color:var(--violet);line-height:1;}
    .wallet-mini__ntc{font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);}
    .sort-bar{display:flex;align-items:center;gap:4px;margin-bottom:14px;padding:10px 14px;background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
    .sort-label{font-family:var(--font-mono);font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-faint);margin-right:8px;}
    .sort-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid transparent;background:transparent;color:var(--text-faint);font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);transition:all .15s;}
    .sort-btn:hover{color:var(--text);border-color:var(--border-mid);}
    .sort-btn.active{background:var(--violet-faint);border-color:var(--violet-dim);color:var(--violet);}
    .feed-count{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:0.1em;}
    .upload-box{background:var(--bg-surface);border:1px solid var(--border-mid);clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));margin-bottom:14px;overflow:hidden;}
    .upload-box__hd{padding:10px 18px;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text-faint);display:flex;align-items:center;justify-content:space-between;}
    .upload-box__body{padding:16px 18px;}
    .form-row{display:flex;gap:10px;margin-bottom:10px;}
    .form-input{flex:1;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:500;padding:10px 14px;outline:none;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);transition:border-color .2s;}
    .form-input:focus{border-color:var(--violet-dim);}
    .form-input::placeholder{color:var(--text-faint);}
    select.form-input{cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;}
    .form-textarea{width:100%;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-family:var(--font-body);font-size:13px;font-weight:300;line-height:1.7;padding:12px 14px;resize:vertical;min-height:70px;outline:none;transition:border-color .2s;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);margin-bottom:10px;box-sizing:border-box;}
    .form-textarea:focus{border-color:var(--violet-dim);}
    .form-textarea::placeholder{color:var(--text-faint);}
    .file-drop{border:1px dashed var(--border-mid);background:var(--bg-elevated);padding:20px;text-align:center;cursor:pointer;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);margin-bottom:10px;transition:border-color .2s;}
    .file-drop:hover,.file-drop.drag{border-color:var(--violet-dim);background:var(--violet-faint);}
    .file-drop__label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);}
    .file-drop__name{font-family:var(--font-mono);font-size:11px;color:var(--violet);margin-top:4px;}
    .upload-footer{display:flex;align-items:center;justify-content:space-between;gap:12px;}
    .upload-error{font-family:var(--font-mono);font-size:10px;color:var(--red-alert);letter-spacing:0.08em;display:none;}
    .upload-error.show{display:block;}
    .btn-submit{padding:10px 24px;background:var(--violet);border:1px solid var(--violet);color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);transition:all .18s;}
    .btn-submit:hover{background:#7B18DF;}
    .btn-submit:disabled{opacity:.5;cursor:not-allowed;}
    .plugin-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
    .plugin-card{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));transition:border-color .18s;overflow:hidden;}
    .plugin-card:hover{border-color:var(--border-mid);}
    .plugin-card.featured{border-color:var(--violet-dim);background:linear-gradient(160deg,rgba(155,48,255,0.08) 0%,var(--bg-surface) 60%);}
    .plugin-card__thumb{width:100%;height:140px;object-fit:cover;background:var(--bg-elevated);display:block;}
    .plugin-card__thumb-placeholder{width:100%;height:140px;background:linear-gradient(135deg,var(--bg-elevated),var(--bg-surface));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:32px;letter-spacing:0.2em;color:var(--text-faint);}
    .plugin-card__body{padding:14px 16px;}
    .plugin-card__tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
    .plugin-tag{font-family:var(--font-mono);font-size:8px;letter-spacing:0.18em;text-transform:uppercase;padding:2px 8px;clip-path:polygon(3px 0,100% 0,calc(100% - 3px) 100%,0 100%);border:1px solid;flex-shrink:0;}
    .tag-free{color:#39FF80;border-color:rgba(57,255,128,.35);background:rgba(57,255,128,.06);}
    .tag-paid{color:var(--violet);border-color:var(--violet-dim);background:var(--violet-faint);}
    .tag-wip{color:#FFE600;border-color:rgba(255,230,0,.35);background:rgba(255,230,0,.06);}
    .tag-featured{color:var(--cyan);border-color:var(--cyan-dim);background:var(--cyan-faint);}
    .plugin-card__title{font-family:var(--font-body);font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
    .plugin-card__author{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:0.08em;margin-bottom:6px;}
    .plugin-card__desc{font-size:12px;font-weight:300;color:var(--text-faint);line-height:1.6;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .plugin-card__footer{display:flex;align-items:center;justify-content:space-between;}
    .plugin-card__price{font-family:var(--font-display);font-size:22px;letter-spacing:0.06em;color:var(--violet);line-height:1;}
    .plugin-card__price.free{color:#39FF80;}
    .plugin-card__price span{font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;color:var(--text-faint);}
    .plugin-card__meta{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);letter-spacing:0.1em;}
    .btn-buy{padding:8px 16px;background:var(--violet);border:none;color:#fff;font-family:var(--font-mono);font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);transition:all .18s;}
    .btn-buy:hover{background:#7B18DF;}
    .btn-buy.owned{background:rgba(57,255,128,.12);color:#39FF80;border:1px solid rgba(57,255,128,.3);}
    .btn-buy.owned:hover{background:rgba(57,255,128,.2);}
    .btn-buy.free-dl{background:rgba(57,255,128,.12);color:#39FF80;border:1px solid rgba(57,255,128,.3);}
    .btn-buy.free-dl:hover{background:rgba(57,255,128,.2);}
    .plugins-empty{text-align:center;padding:60px 24px;font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);}
    .plugins-loading{text-align:center;padding:40px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;color:var(--text-faint);}
    .modal-overlay{position:fixed;inset:0;background:var(--bg-overlay);z-index:300;display:none;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--bg-elevated);border:1px solid var(--border-mid);clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));width:min(600px,95vw);max-height:85vh;overflow-y:auto;}
    .modal__hd{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .modal__title{font-family:var(--font-display);font-size:22px;letter-spacing:0.1em;color:var(--text);}
    .modal__close{background:transparent;border:none;color:var(--text-faint);font-size:20px;cursor:pointer;padding:4px 8px;transition:color .15s;}
    .modal__close:hover{color:var(--red-alert);}
    .modal__body{padding:24px;}
    .modal__thumb{width:100%;height:200px;object-fit:cover;margin-bottom:16px;border:1px solid var(--border);}
    .modal__thumb-placeholder{width:100%;height:160px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:40px;letter-spacing:0.2em;color:var(--text-faint);margin-bottom:16px;border:1px solid var(--border);}
    .modal__meta{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
    .modal__meta-row{display:flex;justify-content:space-between;font-size:12px;padding:8px 0;border-bottom:1px solid var(--border);}
    .modal__meta-row:last-child{border:none;}
    .modal__meta-key{color:var(--text-faint);font-weight:300;}
    .modal__meta-val{font-family:var(--font-mono);font-size:11px;color:var(--text-dim);}
    .modal__desc{font-size:13px;font-weight:300;color:var(--text-dim);line-height:1.7;margin-bottom:20px;}
    .modal__btn-row{display:flex;gap:10px;}
    .modal__buy-btn{flex:1;padding:12px 20px;background:var(--violet);border:none;color:#fff;font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);transition:all .18s;}
    .modal__buy-btn:hover{background:#7B18DF;}
    .modal__buy-btn:disabled{opacity:.5;cursor:not-allowed;}
    .modal__buy-btn.owned{background:rgba(57,255,128,.12);color:#39FF80;border:1px solid rgba(57,255,128,.3);}
    .modal__buy-btn.owned:hover{background:rgba(57,255,128,.2);}
    .toast{position:fixed;bottom:24px;right:24px;z-index:400;padding:12px 20px;background:var(--bg-elevated);border:1px solid var(--violet-dim);clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);font-family:var(--font-mono);font-size:11px;letter-spacing:0.1em;color:var(--violet);display:none;}
    .toast.show{display:block;animation:slideUp .3s ease;}
    .toast.error{color:var(--red-alert);border-color:var(--red-alert);}
    @keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  </style>
</head>
<body>
  <div class="hero__lines" aria-hidden="true" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>
  <div class="page-banner">
    <div class="page-banner__bg" aria-hidden="true"></div>
    <div class="container page-banner__inner">
      <div class="t-label"><span class="t-label-line"></span>Marketplace</div>
      <h1 class="t-heading">PLUGIN <span class="accent-violet">STORE</span></h1>
      <p class="t-body">Community-built plugins for Nokturne. Free and paid. Purchase with NTC coins.</p>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <!-- Plugin detail modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="pluginModal">
      <div class="modal__hd">
        <span class="modal__title" id="modalTitle">Plugin</span>
        <button class="modal__close" id="modalClose">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
    </div>
  </div>
  <main class="section" style="padding-top:0;">
    <div class="container">
      <div class="plugins-wrap">
        <!-- Sidebar -->
        <aside>
          <div class="wallet-mini" id="walletMini">
            <div class="wallet-mini__label">NTC Balance</div>
            <div class="wallet-mini__balance" id="walletBal">—</div>
            <div class="wallet-mini__ntc">Coins</div>
          </div>
          <div class="sidebar-panel">
            <div class="sidebar-panel__hd">Filter</div>
            <button class="filter-btn active" data-filter="all"><span class="filter-btn__dot"></span>All Plugins</button>
            <button class="filter-btn" data-filter="free"><span class="filter-btn__dot"></span>Free</button>
            <button class="filter-btn" data-filter="paid"><span class="filter-btn__dot"></span>Paid</button>
            <button class="filter-btn" data-filter="featured"><span class="filter-btn__dot"></span>Featured</button>
          </div>
          <div class="sidebar-panel" id="uploadToggleWrap">
            <div class="sidebar-panel__hd">Upload</div>
            <button class="filter-btn" id="toggleUploadBtn"><span class="filter-btn__dot"></span>Submit Plugin</button>
          </div>
        </aside>
        <!-- Main -->
        <div>
          <!-- Upload form (hidden by default) -->
          <div class="upload-box" id="uploadBox" style="display:none;">
            <div class="upload-box__hd"><span>Submit Plugin</span><button class="modal__close" id="closeUpload">✕</button></div>
            <div class="upload-box__body">
              <div class="form-row">
                <input class="form-input" id="plugTitle" placeholder="Plugin name" maxlength="80" />
                <input class="form-input" id="plugVersion" placeholder="Version (e.g. 1.0)" style="max-width:120px;" />
              </div>
              <div class="form-row">
                <select class="form-input" id="plugFlair">
                  <option value="Free">Free</option>
                  <option value="Paid">Paid</option>
                  <option value="WIP">WIP</option>
                </select>
                <input class="form-input" id="plugPrice" type="number" min="0" placeholder="Price (NTC, 0=free)" />
              </div>
              <textarea class="form-textarea" id="plugDesc" placeholder="Description..." rows="3"></textarea>
              <div class="file-drop" id="fileDrop">
                <input type="file" id="plugFile" accept=".zip,.py" style="display:none;" />
                <div class="file-drop__label">Drop .zip or .py file here, or click to browse</div>
                <div class="file-drop__name" id="fileLabel"></div>
              </div>
              <div class="file-drop" id="thumbDrop" style="padding:12px;">
                <input type="file" id="plugThumb" accept="image/*" style="display:none;" />
                <div class="file-drop__label">Thumbnail image (optional)</div>
                <div class="file-drop__name" id="thumbLabel"></div>
              </div>
              <div class="upload-footer">
                <span class="upload-error" id="uploadError"></span>
                <button class="btn-submit" id="submitPlugin">Submit Plugin</button>
              </div>
            </div>
          </div>
          <div class="sort-bar">
            <span class="sort-label">Sort:</span>
            <button class="sort-btn active" data-sort="new">New</button>
            <button class="sort-btn" data-sort="popular">Popular</button>
            <button class="sort-btn" data-sort="price-asc">Price ↑</button>
            <span class="feed-count" id="feedCount"></span>
          </div>
          <div class="plugin-grid" id="pluginGrid">
            <div class="plugins-loading">Loading plugins...</div>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNavbar, renderFooter } from '../assets/js/modules/layout.js';
    import { initNavbar } from '../assets/js/modules/navbar.js';

    const SUPABASE_URL = 'https://mmovqnaeozhzzeazrgdm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CPoq9v6zAGVfRH4scFbxcA_gMRX4FJs';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    renderNavbar('../', 'plugins');
    renderFooter('../');
    initNavbar();
    if (document.getElementById('year')) document.getElementById('year').textContent = new Date().getFullYear();

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; }

    const user = session.user;
    const userId = user.id;
    const username = user.user_metadata?.full_name || user.user_metadata?.name || user.user_metadata?.user_name || 'Unknown';

    let allPlugins = [];
    let purchases = new Set();
    let walletBalance = 0;
    let currentFilter = 'all';
    let currentSort = 'new';
    let selectedPlugin = null;
    let isAdmin = false;

    // ── Check admin role
    const { data: roleData } = await supabase.from('user_roles').select('role').eq('user_id', userId).single();
    isAdmin = roleData?.role === 'admin';

    // ── Load wallet
    async function loadWallet() {
      const { data } = await supabase.from('wallets').select('balance').eq('user_id', userId).single();
      walletBalance = data?.balance ?? 0;
      document.getElementById('walletBal').textContent = walletBalance;
    }

    // ── Load purchases
    async function loadPurchases() {
      const { data } = await supabase.from('plugin_purchases').select('plugin_id').eq('user_id', userId);
      purchases = new Set((data || []).map(p => p.plugin_id));
    }

    // ── Load plugins
    async function loadPlugins() {
      const { data, error } = await supabase.from('plugins').select('*').eq('is_deleted', false).order('created_at', { ascending: false });
      if (error) { document.getElementById('pluginGrid').innerHTML = `<div class="plugins-loading" style="color:var(--red-alert);">Error: ${esc(error.message)}</div>`; return; }
      allPlugins = data || [];
      renderGrid();
    }

    function filteredSorted() {
      let list = allPlugins.filter(p => {
        if (currentFilter === 'free') return p.price_ntc === 0;
        if (currentFilter === 'paid') return p.price_ntc > 0;
        if (currentFilter === 'featured') return p.is_featured;
        return true;
      });
      if (currentSort === 'popular') list = [...list].sort((a,b) => (b.download_count||0)-(a.download_count||0));
      else if (currentSort === 'price-asc') list = [...list].sort((a,b) => a.price_ntc - b.price_ntc);
      return list;
    }

    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function renderGrid() {
      const list = filteredSorted();
      const grid = document.getElementById('pluginGrid');
      const cnt = document.getElementById('feedCount');
      if (cnt) cnt.textContent = list.length + ' plugin' + (list.length !== 1 ? 's' : '');

      if (!list.length) {
        grid.innerHTML = '<div class="plugins-empty">No plugins found.</div>'; return;
      }

      grid.innerHTML = list.map(p => {
        const owned = p.price_ntc === 0 || purchases.has(p.id);
        const flairTag = p.flair ? `<span class="plugin-tag tag-${p.flair.toLowerCase()}">${p.flair}</span>` : '';
        const featTag = p.is_featured ? `<span class="plugin-tag tag-featured">Featured</span>` : '';
        const thumb = p.thumbnail_url
          ? `<img class="plugin-card__thumb" src="${esc(p.thumbnail_url)}" alt="thumb" />`
          : `<div class="plugin-card__thumb-placeholder">PLG</div>`;
        const priceDisplay = p.price_ntc === 0 ? `<span class="plugin-card__price free">Free</span>` : `<span class="plugin-card__price">${p.price_ntc}<span> NTC</span></span>`;
        let btnLabel = p.price_ntc === 0 ? 'Download' : owned ? 'Download' : `Buy — ${p.price_ntc} NTC`;
        let btnClass = owned ? (p.price_ntc === 0 ? 'btn-buy free-dl' : 'btn-buy owned') : 'btn-buy';
        return `<div class="plugin-card${p.is_featured?' featured':''}" data-id="${p.id}">
          ${thumb}
          <div class="plugin-card__body">
            <div class="plugin-card__tags">${flairTag}${featTag}</div>
            <div class="plugin-card__title">${esc(p.title)}</div>
            <div class="plugin-card__author">by ${esc(p.username)} · v${esc(p.version)}</div>
            <div class="plugin-card__desc">${esc(p.description)}</div>
            <div class="plugin-card__footer">
              ${priceDisplay}
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
                <div class="plugin-card__meta">↓ ${p.download_count||0}</div>
                <button class="${btnClass}" data-id="${p.id}">${btnLabel}</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      grid.querySelectorAll('.plugin-card').forEach(card => {
        card.addEventListener('click', e => {
          if (e.target.closest('.btn-buy')) return;
          openModal(card.dataset.id);
        });
      });
      grid.querySelectorAll('.btn-buy').forEach(btn => {
        btn.addEventListener('click', e => { e.stopPropagation(); handleBuy(btn.dataset.id); });
      });
    }

    // ── Open modal
    function openModal(pluginId) {
      const p = allPlugins.find(x => String(x.id) === String(pluginId));
      if (!p) return;
      selectedPlugin = p;
      const owned = p.price_ntc === 0 || purchases.has(p.id);
      document.getElementById('modalTitle').textContent = p.title;
      const thumb = p.thumbnail_url
        ? `<img class="modal__thumb" src="${esc(p.thumbnail_url)}" alt="thumb" />`
        : `<div class="modal__thumb-placeholder">PLG</div>`;
      let actionBtn = '';
      if (owned) {
        actionBtn = `<button class="modal__buy-btn owned" id="modalActionBtn">Download</button>`;
      } else {
        actionBtn = `<button class="modal__buy-btn" id="modalActionBtn">Buy — ${p.price_ntc} NTC</button>`;
      }
      const adminBtns = isAdmin ? `
        <button class="modal__buy-btn" style="background:var(--bg-elevated);color:var(--text-dim);border:1px solid var(--border);" id="adminFeatureBtn">${p.is_featured?'Unfeature':'Feature'}</button>
        <button class="modal__buy-btn" style="background:rgba(255,34,80,.12);color:var(--red-alert);border:1px solid rgba(255,34,80,.3);" id="adminDeleteBtn">Remove</button>
      ` : '';
      document.getElementById('modalBody').innerHTML = `
        ${thumb}
        <div class="plugin-card__tags" style="margin-bottom:12px;">
          ${p.flair ? `<span class="plugin-tag tag-${p.flair.toLowerCase()}">${p.flair}</span>` : ''}
          ${p.is_featured ? `<span class="plugin-tag tag-featured">Featured</span>` : ''}
        </div>
        <div class="modal__desc">${esc(p.description)}</div>
        <div class="modal__meta">
          <div class="modal__meta-row"><span class="modal__meta-key">Author</span><span class="modal__meta-val">${esc(p.username)}</span></div>
          <div class="modal__meta-row"><span class="modal__meta-key">Version</span><span class="modal__meta-val">${esc(p.version)}</span></div>
          <div class="modal__meta-row"><span class="modal__meta-key">Downloads</span><span class="modal__meta-val">${p.download_count||0}</span></div>
          <div class="modal__meta-row"><span class="modal__meta-key">Price</span><span class="modal__meta-val">${p.price_ntc===0?'Free':p.price_ntc+' NTC'}</span></div>
          <div class="modal__meta-row"><span class="modal__meta-key">File</span><span class="modal__meta-val">${p.file_name ? esc(p.file_name) : 'N/A'}</span></div>
        </div>
        <div class="modal__btn-row">${actionBtn}${adminBtns}</div>`;

      document.getElementById('modalOverlay').classList.add('open');

      document.getElementById('modalActionBtn').addEventListener('click', () => {
        if (owned) { downloadPlugin(p); }
        else { handleBuy(p.id); }
      });

      if (isAdmin) {
        document.getElementById('adminFeatureBtn').addEventListener('click', () => toggleFeature(p));
        document.getElementById('adminDeleteBtn').addEventListener('click', () => removePlugin(p));
      }
    }

    document.getElementById('modalClose').addEventListener('click', () => document.getElementById('modalOverlay').classList.remove('open'));
    document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) document.getElementById('modalOverlay').classList.remove('open'); });

    // ── Buy / download
    async function handleBuy(pluginId) {
      const p = allPlugins.find(x => String(x.id) === String(pluginId));
      if (!p) return;
      if (p.price_ntc === 0 || purchases.has(p.id)) { downloadPlugin(p); return; }
      if (walletBalance < p.price_ntc) { showToast('Insufficient NTC balance', true); return; }

      // Deduct wallet
      const newBal = walletBalance - p.price_ntc;
      const { error: walletErr } = await supabase.from('wallets').update({ balance: newBal, updated_at: new Date().toISOString() }).eq('user_id', userId);
      if (walletErr) { showToast('Purchase failed: ' + walletErr.message, true); return; }

      // Log transaction
      await supabase.from('transactions').insert({ user_id: userId, amount: -p.price_ntc, balance_after: newBal, type: 'purchase_plugin', description: 'Plugin: ' + p.title, reference_id: p.id });

      // Record purchase
      await supabase.from('plugin_purchases').insert({ user_id: userId, plugin_id: p.id, price_paid: p.price_ntc });

      // Notify seller
      if (p.user_id !== userId) {
        await supabase.from('notifications').insert({ user_id: p.user_id, type: 'plugin_purchase', title: 'Plugin sold!', body: `${username} purchased "${p.title}" for ${p.price_ntc} NTC`, link_type: 'plugin', link_id: p.id });
      }

      // Increment download count
      await supabase.from('plugins').update({ download_count: (p.download_count||0)+1 }).eq('id', p.id);

      walletBalance = newBal;
      document.getElementById('walletBal').textContent = walletBalance;
      purchases.add(p.id);
      showToast(`Purchased "${p.title}" for ${p.price_ntc} NTC`);
      loadPlugins();
      document.getElementById('modalOverlay').classList.remove('open');
      downloadPlugin(p);
    }

    async function downloadPlugin(p) {
      if (!p.file_url) { showToast('No file attached to this plugin', true); return; }
      const { data, error } = await supabase.storage.from('plugins').createSignedUrl(p.file_url, 60);
      if (error) { showToast('Download error: ' + error.message, true); return; }
      const a = document.createElement('a');
      a.href = data.signedUrl;
      a.download = p.file_name || 'plugin';
      a.click();
      showToast('Download started');
    }

    async function toggleFeature(p) {
      const { error } = await supabase.from('plugins').update({ is_featured: !p.is_featured }).eq('id', p.id);
      if (!error) { showToast(p.is_featured ? 'Unfeatured' : 'Featured'); document.getElementById('modalOverlay').classList.remove('open'); loadPlugins(); }
    }

    async function removePlugin(p) {
      if (!confirm(`Remove "${p.title}"?`)) return;
      await supabase.from('plugins').update({ is_deleted: true }).eq('id', p.id);
      showToast('Plugin removed'); document.getElementById('modalOverlay').classList.remove('open'); loadPlugins();
    }

    // ── Upload form
    let selectedFile = null;
    let selectedThumb = null;

    document.getElementById('toggleUploadBtn').addEventListener('click', () => {
      const box = document.getElementById('uploadBox');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    });
    document.getElementById('closeUpload').addEventListener('click', () => { document.getElementById('uploadBox').style.display = 'none'; });

    document.getElementById('fileDrop').addEventListener('click', () => document.getElementById('plugFile').click());
    document.getElementById('plugFile').addEventListener('change', e => {
      selectedFile = e.target.files[0];
      document.getElementById('fileLabel').textContent = selectedFile ? selectedFile.name : '';
    });
    document.getElementById('thumbDrop').addEventListener('click', () => document.getElementById('plugThumb').click());
    document.getElementById('plugThumb').addEventListener('change', e => {
      selectedThumb = e.target.files[0];
      document.getElementById('thumbLabel').textContent = selectedThumb ? selectedThumb.name : '';
    });

    document.getElementById('submitPlugin').addEventListener('click', async () => {
      const title = document.getElementById('plugTitle').value.trim();
      const version = document.getElementById('plugVersion').value.trim() || '1.0';
      const desc = document.getElementById('plugDesc').value.trim();
      const flair = document.getElementById('plugFlair').value;
      const price = parseInt(document.getElementById('plugPrice').value) || 0;
      const errEl = document.getElementById('uploadError');
      const btn = document.getElementById('submitPlugin');
      errEl.classList.remove('show');

      if (!title) { errEl.textContent = 'Title required.'; errEl.classList.add('show'); return; }
      if (!desc) { errEl.textContent = 'Description required.'; errEl.classList.add('show'); return; }

      btn.textContent = 'Uploading...'; btn.disabled = true;

      let file_url = null, file_name = null, file_type = null, thumbnail_url = null;

      if (selectedFile) {
        const ext = selectedFile.name.split('.').pop().toLowerCase();
        const path = `${userId}/${Date.now()}_${selectedFile.name}`;
        const { data: fData, error: fErr } = await supabase.storage.from('plugins').upload(path, selectedFile);
        if (fErr) { errEl.textContent = 'File upload failed: ' + fErr.message; errEl.classList.add('show'); btn.textContent = 'Submit Plugin'; btn.disabled = false; return; }
        file_url = fData.path; file_name = selectedFile.name; file_type = ext;
      }

      if (selectedThumb) {
        const tPath = `thumbs/${userId}/${Date.now()}_${selectedThumb.name}`;
        const { data: tData } = await supabase.storage.from('plugins').upload(tPath, selectedThumb);
        if (tData) {
          const { data: urlData } = supabase.storage.from('plugins').getPublicUrl(tData.path);
          thumbnail_url = urlData?.publicUrl;
        }
      }

      const { error } = await supabase.from('plugins').insert({
        user_id: userId, username, title, description: desc, version,
        price_ntc: price, flair, file_url, file_name, file_type, thumbnail_url,
        download_count: 0, is_featured: false, is_deleted: false, tags: []
      });

      btn.textContent = 'Submit Plugin'; btn.disabled = false;
      if (error) { errEl.textContent = 'Submit failed: ' + error.message; errEl.classList.add('show'); return; }

      document.getElementById('plugTitle').value = '';
      document.getElementById('plugDesc').value = '';
      document.getElementById('plugVersion').value = '';
      document.getElementById('plugPrice').value = '';
      document.getElementById('fileLabel').textContent = '';
      document.getElementById('thumbLabel').textContent = '';
      selectedFile = null; selectedThumb = null;
      document.getElementById('uploadBox').style.display = 'none';
      showToast('Plugin submitted!');
      loadPlugins();
    });

    // ── Filters + sort
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentFilter = btn.dataset.filter; renderGrid();
      });
    });
    document.querySelectorAll('.sort-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active'); currentSort = btn.dataset.sort; renderGrid();
      });
    });

    function showToast(msg, error = false) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast show' + (error ? ' error' : '');
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    await loadWallet();
    await loadPurchases();
    await loadPlugins();
  </script>
</body>
</html>
