<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Profile — Nokturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    body { padding-top: var(--nav-height); background: var(--bg); }
    .fu-wrap { max-width: 860px; margin: 0 auto; padding: 28px 24px 80px; }
    .back-link { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); text-decoration: none; transition: color 0.15s; margin-bottom: 24px; }
    .back-link:hover { color: var(--violet); }

    /* Profile header card */
    .fu-header { background: var(--bg-surface); border: 1px solid var(--border); clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px)); overflow: hidden; margin-bottom: 20px; }
    .fu-header__top { display: flex; align-items: flex-start; gap: 18px; padding: 24px; flex-wrap: wrap; }
    .fu-avatar { width: 72px; height: 72px; border-radius: 50%; background: var(--violet-faint); border: 2px solid var(--violet-dim); display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--violet); flex-shrink: 0; }
    .fu-avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: none; }
    .fu-identity { flex: 1; }
    .fu-username { font-family: var(--font-display); font-size: 28px; letter-spacing: 0.06em; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .fu-role { display: inline-block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; padding: 2px 10px; border: 1px solid; clip-path: polygon(3px 0, 100% 0, calc(100% - 3px) 100%, 0 100%); margin-bottom: 8px; }
    .role-admin { color: var(--cyan); border-color: var(--cyan-dim); background: var(--cyan-faint); }
    .role-mod { color: #39FF80; border-color: rgba(57,255,128,.3); background: rgba(57,255,128,.05); }
    .role-premium { color: var(--violet); border-color: var(--violet-dim); background: var(--violet-faint); }
    .role-member { color: var(--text-faint); border-color: var(--border); background: var(--bg-elevated); }
    .fu-joined { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .fu-suspended { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: rgba(255,34,80,.08); border: 1px solid rgba(255,34,80,.3); clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); font-family: var(--font-mono); font-size: 10px; color: var(--red-alert); margin-top: 8px; }

    /* Stats bar */
    .fu-stats-bar { display: flex; align-items: stretch; border-top: 1px solid var(--border); overflow-x: auto; }
    .fu-stat { flex: 1; min-width: 90px; padding: 14px 12px; text-align: center; border-right: 1px solid var(--border); }
    .fu-stat:last-child { border-right: none; }
    .fu-stat__val { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.06em; color: var(--text); line-height: 1; margin-bottom: 3px; }
    .fu-stat__label { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-faint); }

    /* Content sections */
    .fu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media(max-width:640px){ .fu-grid { grid-template-columns: 1fr; } }
    .fu-section { background: var(--bg-surface); border: 1px solid var(--border); clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px)); overflow: hidden; margin-bottom: 16px; }
    .fu-section-full { grid-column: 1 / -1; }
    .fu-sec-hd { padding: 9px 16px; border-bottom: 1px solid var(--border); font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); background: var(--bg-elevated); }
    .fu-sec-body { padding: 14px 16px; }
    .fu-empty { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); letter-spacing: 0.1em; }

    /* Reply item */
    .reply-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .reply-item:last-child { border-bottom: none; }
    .reply-item:hover .reply-item__title { color: var(--violet); }
    .reply-item__bar { width: 3px; align-self: stretch; background: var(--violet-dim); flex-shrink: 0; }
    .reply-item__content { flex: 1; min-width: 0; }
    .reply-item__title { font-size: 12px; font-weight: 500; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; transition: color 0.15s; }
    .reply-item__meta { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }
    .reply-item__hearts { color: #FF6B6B; }

    /* Liked by item */
    .liked-by-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .liked-by-item:last-child { border-bottom: none; }
    .liked-by-item:hover .liked-by-item__name { color: var(--violet); }
    .liked-by-item__av { width: 26px; height: 26px; border-radius: 50%; background: var(--violet-faint); border: 1px solid var(--violet-dim); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--violet); flex-shrink: 0; }
    .liked-by-item__name { font-size: 12px; font-weight: 500; color: var(--text-dim); transition: color 0.15s; }
    .liked-by-item__hearts { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-left: auto; }

    .loading-spin { text-align: center; padding: 60px 20px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--violet); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
  </style>
</head>
<body>
  <div class="fu-wrap">
    <a class="back-link" id="backLink" href="forum.html">← Back to Forum</a>
    <div id="loading" class="loading-spin">Loading profile...</div>
    <div id="profileContent" style="display:none;"></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNavbar, renderFooter } from '../assets/js/modules/layout.js';
    import { initNavbar } from '../assets/js/modules/navbar.js';

    const SUPABASE_URL = 'https://mmovqnaeozhzzeazrgdm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CPoq9v6zAGVfRH4scFbxcA_gMRX4FJs';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    renderNavbar('../', 'forum');
    renderFooter('../');
    initNavbar();

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; }

    const targetUsername = new URLSearchParams(window.location.search).get('user');
    if (!targetUsername) { window.location.href = 'forum.html'; }

    document.title = `${targetUsername} — Forum Profile — Nokturne`;

    // Load all data about this user from forum activity
    const [postsRes, repliesRes, profileRes] = await Promise.all([
      supabase.from('forum_posts').select('id, title, upvotes, created_at, reply_count, view_count').eq('username', targetUsername).order('created_at', { ascending: false }),
      supabase.from('forum_comments').select('id, body, post_id, created_at').eq('username', targetUsername).order('created_at', { ascending: false }).limit(20),
      supabase.from('profiles').select('id, avatar_url, created_at').eq('username', targetUsername).maybeSingle(),
    ]);

    const posts   = postsRes.data || [];
    const replies = repliesRes.data || [];
    const profile = profileRes.data;

    // Get role
    let role = 'member';
    if (profile?.id) {
      const { data: roleData } = await supabase.from('user_roles').select('role').eq('user_id', profile.id).single();
      role = roleData?.role || 'member';
    }

    // Compute stats
    const totalReplies = replies.length;
    const totalTopics  = posts.length;
    const totalLikesReceived = posts.reduce((s,p) => s + (p.upvotes||0), 0);
    const totalViews = posts.reduce((s,p) => s + (p.view_count||0), 0);
    const memberSince = profile?.created_at ? new Date(profile.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('profileContent').style.display = 'block';

    const roleColors = { admin: 'role-admin', moderator: 'role-mod', premium: 'role-premium', member: 'role-member', guest: 'role-member' };
    const roleLabels = { admin: 'Admin', moderator: 'Moderator', premium: 'Premium Member', member: 'Member', guest: 'Guest' };

    const topReplies = replies.slice(0, 5);
    const topTopics  = [...posts].sort((a,b) => (b.upvotes||0)-(a.upvotes||0)).slice(0,5);

    const repliesHtml = topReplies.length ? topReplies.map(r => `
      <div class="reply-item" data-pid="${r.post_id}">
        <div class="reply-item__bar"></div>
        <div class="reply-item__content">
          <div class="reply-item__title">${esc(r.body.slice(0,120))}${r.body.length>120?'…':''}</div>
          <div class="reply-item__meta">
            <span>${timeAgo(r.created_at)}</span>
          </div>
        </div>
      </div>`) .join('') : '<div class="fu-empty">No replies yet.</div>';

    const topicsHtml = topTopics.length ? topTopics.map(p => `
      <div class="reply-item" data-pid="${p.id}">
        <div class="reply-item__bar"></div>
        <div class="reply-item__content">
          <div class="reply-item__title">${esc(p.title)}</div>
          <div class="reply-item__meta">
            <span class="reply-item__hearts">♥ ${p.upvotes||0}</span>
            <span>💬 ${p.reply_count||0}</span>
            <span>${timeAgo(p.created_at)}</span>
          </div>
        </div>
      </div>`).join('') : '<div class="fu-empty">No topics yet.</div>';

    document.getElementById('profileContent').innerHTML = `
      <div class="fu-header">
        <div class="fu-header__top">
          <div class="fu-avatar">
            ${profile?.avatar_url ? `<img src="${esc(profile.avatar_url)}" alt="avatar" id="fuAvatar" style="display:block;" />` : '◈'}
          </div>
          <div class="fu-identity">
            <div class="fu-username">${esc(targetUsername)}</div>
            <div><span class="fu-role ${roleColors[role]||'role-member'}">${roleLabels[role]||'Member'}</span></div>
            <div class="fu-joined">Joined ${memberSince}</div>
          </div>
        </div>
        <div class="fu-stats-bar">
          <div class="fu-stat"><div class="fu-stat__val">${totalTopics}</div><div class="fu-stat__label">Topics</div></div>
          <div class="fu-stat"><div class="fu-stat__val">${totalReplies}</div><div class="fu-stat__label">Replies</div></div>
          <div class="fu-stat"><div class="fu-stat__val">${totalViews}</div><div class="fu-stat__label">Views</div></div>
          <div class="fu-stat"><div class="fu-stat__val">${totalLikesReceived}</div><div class="fu-stat__label">♥ Received</div></div>
        </div>
      </div>

      <div class="fu-grid">
        <div class="fu-section">
          <div class="fu-sec-hd">Top Replies</div>
          <div class="fu-sec-body" id="topReplies">${repliesHtml}</div>
        </div>
        <div class="fu-section">
          <div class="fu-sec-hd">Top Topics</div>
          <div class="fu-sec-body" id="topTopics">${topicsHtml}</div>
        </div>
      </div>`;

    // Click on reply/topic items → go back to forum
    document.querySelectorAll('.reply-item[data-pid]').forEach(el => {
      el.addEventListener('click', () => {
        window.location.href = `forum.html?post=${el.dataset.pid}`;
      });
    });

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function timeAgo(ts) {
      const s = Math.floor((Date.now()-new Date(ts))/1000);
      if (s<60) return s+'s ago'; if (s<3600) return Math.floor(s/60)+'m ago';
      if (s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago';
    }
  </script>
</body>
</html>
