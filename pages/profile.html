<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Nokturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    body { padding-top: var(--nav-height); }
    .profile-page { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

    .profile-header {
      display: flex; align-items: flex-start; gap: 24px;
      background: var(--bg-surface); border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      padding: 28px; margin-bottom: 24px;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid var(--violet-dim); object-fit: cover;
      background: var(--bg-elevated); display: flex; align-items: center;
      justify-content: center; font-size: 32px; color: var(--violet); flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .profile-info { flex: 1; }
    .profile-username { font-family: var(--font-display); font-size: 36px; letter-spacing: 0.06em; color: var(--text); line-height: 1; margin-bottom: 8px; }
    .profile-role {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; padding: 3px 12px;
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      border: 1px solid; display: inline-block; margin-bottom: 12px;
    }
    .role-admin     { color: var(--cyan);    border-color: var(--cyan-dim);    background: var(--cyan-faint); }
    .role-moderator { color: #39FF80;        border-color: rgba(57,255,128,.35); background: rgba(57,255,128,.06); }
    .role-premium   { color: var(--violet);  border-color: var(--violet-dim);  background: var(--violet-faint); }
    .role-member    { color: var(--text-dim);border-color: var(--border-mid);  background: var(--bg-elevated); }
    .role-guest     { color: var(--text-faint);border-color: var(--border);    background: transparent; }
    .profile-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .profile-meta-item { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .profile-meta-item span { color: var(--text-dim); }

    /* Tabs */
    .profile-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .profile-tab { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-faint); font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-bottom: -1px; }
    .profile-tab:hover { color: var(--text-dim); }
    .profile-tab.active { color: var(--violet); border-bottom-color: var(--violet); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-box { background: var(--bg-surface); border: 1px solid var(--border); clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); padding: 16px; text-align: center; }
    .stat-box__val { font-family: var(--font-display); font-size: 32px; letter-spacing: 0.06em; color: var(--violet); line-height: 1; margin-bottom: 4px; }
    .stat-box__label { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }

    /* Cards */
    .section-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .section-hd__title { font-family: var(--font-display); font-size: 18px; letter-spacing: 0.1em; color: var(--text); }
    .section-hd__line { flex: 1; height: 1px; background: var(--border); }

    .item-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--bg-surface); border: 1px solid var(--border); clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); margin-bottom: 2px; cursor: pointer; transition: all 0.15s; position: relative; }
    .item-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; transition: background 0.15s; }
    .item-row:hover { background: var(--bg-elevated); }
    .item-row:hover::before { background: var(--violet); }
    .item-row__title { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-dim); }
    .item-row__price { font-family: var(--font-mono); font-size: 11px; color: var(--violet); }
    .item-row__date  { font-family: var(--font-mono); font-size: 9px;  color: var(--text-faint); }
    .item-row__type  { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; padding: 2px 8px; border: 1px solid var(--border); color: var(--text-faint); clip-path: polygon(2px 0, 100% 0, calc(100% - 2px) 100%, 0 100%); }

    .tx-row { display: flex; align-items: center; gap: 14px; padding: 10px 16px; background: var(--bg-surface); border: 1px solid var(--border); margin-bottom: 2px; }
    .tx-amount { font-family: var(--font-mono); font-size: 13px; font-weight: 700; min-width: 80px; }
    .tx-amount.positive { color: #39FF80; }
    .tx-amount.negative { color: var(--red-alert); }
    .tx-desc { flex: 1; font-size: 12px; font-weight: 300; color: var(--text-dim); }
    .tx-date { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }

    .empty-state { text-align: center; padding: 40px 24px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); }
    .loading-state { text-align: center; padding: 30px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--violet); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
    .signout-btn { padding: 10px 24px; background: transparent; border: 1px solid var(--red-alert); color: var(--red-alert); font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%); transition: all 0.18s; }
    .signout-btn:hover { background: rgba(255,34,80,.1); }
  </style>
</head>
<body>
  <div class="profile-page">
    <div id="profileContent"><div class="loading-state">Loading profile...</div></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNavbar, renderFooter } from '../assets/js/modules/layout.js';
    import { initNavbar } from '../assets/js/modules/navbar.js';

    const SUPABASE_URL = 'https://mmovqnaeozhzzeazrgdm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CPoq9v6zAGVfRH4scFbxcA_gMRX4FJs';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    renderNavbar('../', 'profile');
    renderFooter('../');
    initNavbar();

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; }
    const userId = session.user.id;
    const username = session.user.user_metadata?.full_name || session.user.user_metadata?.user_name || 'Unknown';
    const avatarUrl = session.user.user_metadata?.avatar_url || '';
    const joinDate = new Date(session.user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

    const [roleRes, walletRes] = await Promise.all([
      supabase.from('user_roles').select('role').eq('user_id', userId).single(),
      supabase.from('wallets').select('balance').eq('user_id', userId).single(),
    ]);
    const role = roleRes.data?.role || 'guest';
    const balance = walletRes.data?.balance ?? 0;

    const roleLabels = { admin:'Admin', moderator:'Moderator', premium:'Premium', member:'Member', guest:'Guest' };
    const roleClasses = { admin:'role-admin', moderator:'role-moderator', premium:'role-premium', member:'role-member', guest:'role-guest' };

    const avatarHtml = avatarUrl
      ? `<div class="profile-avatar"><img src="${avatarUrl}" alt="avatar" /></div>`
      : `<div class="profile-avatar">◈</div>`;

    document.getElementById('profileContent').innerHTML = `
      <div class="profile-header">
        ${avatarHtml}
        <div class="profile-info">
          <div class="profile-username">${esc(username)}</div>
          <span class="profile-role ${roleClasses[role]||'role-guest'}">${roleLabels[role]||'Guest'}</span>
          <div class="profile-meta">
            <div class="profile-meta-item">Joined <span>${joinDate}</span></div>
            <div class="profile-meta-item">Email <span>${esc(session.user.email||'—')}</span></div>
          </div>
        </div>
        <button class="signout-btn" id="signoutBtn">Sign Out</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box"><div class="stat-box__val">${balance}</div><div class="stat-box__label">NTC Balance</div></div>
        <div class="stat-box"><div class="stat-box__val" id="statItems">—</div><div class="stat-box__label">My Listings</div></div>
        <div class="stat-box"><div class="stat-box__val" id="statPurchases">—</div><div class="stat-box__label">Purchased</div></div>
        <div class="stat-box"><div class="stat-box__val" id="statEarned">—</div><div class="stat-box__label">NTC Earned</div></div>
      </div>

      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="summary">Summary</button>
        <button class="profile-tab" data-tab="listings" id="tab-listings">My Listings</button>
        <button class="profile-tab" data-tab="purchases" id="tab-purchases">Purchases</button>
        <button class="profile-tab" data-tab="transactions" id="tab-transactions">Transactions</button>
      </div>

      <div class="tab-panel active" id="panel-summary">
        <div class="section-hd"><div class="section-hd__title">ACCOUNT OVERVIEW</div><div class="section-hd__line"></div></div>
        <div style="font-size:13px;font-weight:300;color:var(--text-dim);line-height:1.8;">
          Welcome back, ${esc(username)}. Your role is <strong style="color:var(--violet);">${roleLabels[role]||'Guest'}</strong>.
          You currently hold <strong style="color:var(--violet);">${balance} NTC</strong> in your wallet.
          Use it to purchase plugins, configs, and scripts from the marketplace.
        </div>
      </div>

      <div class="tab-panel" id="panel-listings">
        <div class="section-hd"><div class="section-hd__title">MY LISTINGS</div><div class="section-hd__line"></div></div>
        <div id="listingsContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-purchases">
        <div class="section-hd"><div class="section-hd__title">PURCHASES</div><div class="section-hd__line"></div></div>
        <div id="purchasesContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-transactions">
        <div class="section-hd"><div class="section-hd__title">TRANSACTIONS</div><div class="section-hd__line"></div></div>
        <div id="transactionsContainer"><div class="loading-state">Loading...</div></div>
      </div>`;

    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '../index.html';
    });

    document.querySelectorAll('.profile-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'listings') loadListings();
        if (tab.dataset.tab === 'purchases') loadPurchases();
        if (tab.dataset.tab === 'transactions') loadTransactions();
      });
    });

    // Check hash for direct tab
    const hash = window.location.hash.replace('#','');
    if (['listings','purchases','transactions'].includes(hash)) {
      document.querySelector(`[data-tab="${hash}"]`)?.click();
    }

    async function loadListings() {
      const { data } = await supabase.from('plugins').select('*').eq('user_id', userId).eq('is_deleted', false).order('created_at', { ascending: false });
      document.getElementById('statItems').textContent = (data||[]).length;
      const container = document.getElementById('listingsContainer');
      if (!data||!data.length) { container.innerHTML = '<div class="empty-state">No listings yet</div>'; return; }
      container.innerHTML = data.map(p => `
        <div class="item-row">
          <span class="item-row__type">${p.file_type||'plugin'}</span>
          <span class="item-row__title">${esc(p.title)}</span>
          <span class="item-row__price">${p.price_ntc===0?'Free':p.price_ntc+' NTC'}</span>
          <span class="item-row__date">↓ ${p.download_count||0}</span>
          <span class="item-row__date">${new Date(p.created_at).toLocaleDateString()}</span>
        </div>`).join('');
    }

    async function loadPurchases() {
      const { data } = await supabase.from('plugin_purchases').select('*, plugins(title, file_type, price_ntc)').eq('user_id', userId).order('created_at', { ascending: false });
      document.getElementById('statPurchases').textContent = (data||[]).length;
      const container = document.getElementById('purchasesContainer');
      if (!data||!data.length) { container.innerHTML = '<div class="empty-state">No purchases yet</div>'; return; }
      container.innerHTML = data.map(p => `
        <div class="item-row">
          <span class="item-row__type">${p.plugins?.file_type||'item'}</span>
          <span class="item-row__title">${esc(p.plugins?.title||'Unknown item')}</span>
          <span class="item-row__price">${p.price_paid===0?'Free':p.price_paid+' NTC'}</span>
          <span class="item-row__date">${new Date(p.created_at).toLocaleDateString()}</span>
        </div>`).join('');
    }

    async function loadTransactions() {
      const { data } = await supabase.from('transactions').select('*').eq('user_id', userId).order('created_at', { ascending: false });
      const earned = (data||[]).filter(t=>t.amount>0).reduce((a,b)=>a+(b.amount||0),0);
      document.getElementById('statEarned').textContent = earned;
      const container = document.getElementById('transactionsContainer');
      if (!data||!data.length) { container.innerHTML = '<div class="empty-state">No transactions yet</div>'; return; }
      container.innerHTML = data.map(t => `
        <div class="tx-row">
          <span class="tx-amount ${t.amount>=0?'positive':'negative'}">${t.amount>=0?'+':''}${t.amount} NTC</span>
          <span class="tx-desc">${esc(t.description||t.type||'')}</span>
          <span class="tx-date">${new Date(t.created_at).toLocaleDateString()}</span>
        </div>`).join('');
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
</body>
</html>
