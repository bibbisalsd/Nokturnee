<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Nokturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    body { padding-top: var(--nav-height); }
    .profile-page { max-width: 960px; margin: 0 auto; padding: 40px 24px 80px; }

    .profile-header {
      display: flex; align-items: flex-start; gap: 24px;
      background: var(--bg-surface); border: 1px solid var(--border);
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
      padding: 28px; margin-bottom: 24px;
    }
    .profile-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      border: 2px solid var(--violet-dim); object-fit: cover;
      background: var(--bg-elevated); display: flex; align-items: center;
      justify-content: center; font-size: 32px; color: var(--violet); flex-shrink: 0;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .profile-info { flex: 1; }
    .profile-username { font-family: var(--font-display); font-size: 36px; letter-spacing: 0.06em; color: var(--text); line-height: 1; margin-bottom: 8px; }
    .profile-role {
      font-family: var(--font-mono); font-size: 9px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase; padding: 3px 12px;
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      border: 1px solid; display: inline-block; margin-bottom: 12px;
    }
    .role-admin     { color: var(--cyan);    border-color: var(--cyan-dim);    background: var(--cyan-faint); }
    .role-moderator { color: #39FF80;        border-color: rgba(57,255,128,.35); background: rgba(57,255,128,.06); }
    .role-premium   { color: var(--violet);  border-color: var(--violet-dim);  background: var(--violet-faint); }
    .role-member    { color: var(--text-dim);border-color: var(--border-mid);  background: var(--bg-elevated); }
    .role-guest     { color: var(--text-faint);border-color: var(--border);    background: transparent; }
    .profile-meta { display: flex; gap: 20px; flex-wrap: wrap; }
    .profile-meta-item { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
    .profile-meta-item span { color: var(--text-dim); }

    /* Tabs */
    .profile-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
    .profile-tab { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-faint); font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; margin-bottom: -1px; }
    .profile-tab:hover { color: var(--text-dim); }
    .profile-tab.active { color: var(--violet); border-bottom-color: var(--violet); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
    .stat-box { background: var(--bg-surface); border: 1px solid var(--border); clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%); padding: 16px; text-align: center; }
    .stat-box__val { font-family: var(--font-display); font-size: 32px; letter-spacing: 0.06em; color: var(--violet); line-height: 1; margin-bottom: 4px; }
    .stat-box__label { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-faint); }

    /* Cards */
    .section-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
    .section-hd__title { font-family: var(--font-display); font-size: 18px; letter-spacing: 0.1em; color: var(--text); }
    .section-hd__line { flex: 1; height: 1px; background: var(--border); }

    .item-row { display: flex; align-items: center; gap: 14px; padding: 12px 16px; background: var(--bg-surface); border: 1px solid var(--border); clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px)); margin-bottom: 2px; cursor: pointer; transition: all 0.15s; position: relative; }
    .item-row::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: transparent; transition: background 0.15s; }
    .item-row:hover { background: var(--bg-elevated); }
    .item-row:hover::before { background: var(--violet); }
    .item-row__title { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-dim); }
    .item-row__price { font-family: var(--font-mono); font-size: 11px; color: var(--violet); }
    .item-row__date  { font-family: var(--font-mono); font-size: 9px;  color: var(--text-faint); }
    .item-row__type  { font-family: var(--font-mono); font-size: 8px; letter-spacing: 0.16em; text-transform: uppercase; padding: 2px 8px; border: 1px solid var(--border); color: var(--text-faint); clip-path: polygon(2px 0, 100% 0, calc(100% - 2px) 100%, 0 100%); }

    .tx-row { display: flex; align-items: center; gap: 14px; padding: 10px 16px; background: var(--bg-surface); border: 1px solid var(--border); margin-bottom: 2px; }
    .tx-amount { font-family: var(--font-mono); font-size: 13px; font-weight: 700; min-width: 80px; }
    .tx-amount.positive { color: #39FF80; }
    .tx-amount.negative { color: var(--red-alert); }
    .tx-desc { flex: 1; font-size: 12px; font-weight: 300; color: var(--text-dim); }
    .tx-date { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); }

    .empty-state { text-align: center; padding: 40px 24px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-faint); }
    .loading-state { text-align: center; padding: 30px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--violet); animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
    .signout-btn { padding: 10px 24px; background: transparent; border: 1px solid var(--red-alert); color: var(--red-alert); font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; cursor: pointer; clip-path: polygon(5px 0, 100% 0, calc(100% - 5px) 100%, 0 100%); transition: all 0.18s; }
    .signout-btn:hover { background: rgba(255,34,80,.1); }
  </style>
</head>
<body>
  <div class="profile-page">
    <div id="profileContent"><div class="loading-state">Loading profile...</div></div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
    import { renderNavbar, renderFooter } from '../assets/js/modules/layout.js';
    import { initNavbar } from '../assets/js/modules/navbar.js';

    const SUPABASE_URL = 'https://mmovqnaeozhzzeazrgdm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CPoq9v6zAGVfRH4scFbxcA_gMRX4FJs';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    renderNavbar('../', 'profile');
    renderFooter('../');
    initNavbar();

    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; }
    const userId = session.user.id;
    const username = session.user.user_metadata?.full_name || session.user.user_metadata?.user_name || 'Unknown';
    const avatarUrl = session.user.user_metadata?.avatar_url || '';
    const joinDate = new Date(session.user.created_at).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });

    const [roleRes, walletRes] = await Promise.all([
      supabase.from('user_roles').select('role').eq('user_id', userId).single(),
      supabase.from('wallets').select('balance').eq('user_id', userId).single(),
    ]);
    const role = roleRes.data?.role || 'guest';
    const balance = walletRes.data?.balance ?? 0;

    const roleLabels = { admin:'Admin', moderator:'Moderator', premium:'Premium', member:'Member', guest:'Guest' };
    const roleClasses = { admin:'role-admin', moderator:'role-moderator', premium:'role-premium', member:'role-member', guest:'role-guest' };

    const avatarHtml = avatarUrl
      ? `<div class="profile-avatar"><img src="${avatarUrl}" alt="avatar" /></div>`
      : `<div class="profile-avatar">◈</div>`;

    document.getElementById('profileContent').innerHTML = `
      <div class="profile-header">
        ${avatarHtml}
        <div class="profile-info">
          <div class="profile-username">${esc(username)}</div>
          <span class="profile-role ${roleClasses[role]||'role-guest'}">${roleLabels[role]||'Guest'}</span>
          <div class="profile-meta">
            <div class="profile-meta-item">Joined <span>${joinDate}</span></div>
            <div class="profile-meta-item">Email <span>${esc(session.user.email||'—')}</span></div>
          </div>
        </div>
        <button class="signout-btn" id="signoutBtn">Sign Out</button>
      </div>

      <div class="stats-grid">
        <div class="stat-box"><div class="stat-box__val">${balance}</div><div class="stat-box__label">NTC Balance</div></div>
        <div class="stat-box"><div class="stat-box__val" id="statItems">—</div><div class="stat-box__label">My Listings</div></div>
        <div class="stat-box"><div class="stat-box__val" id="statPurchases">—</div><div class="stat-box__label">Purchased</div></div>
        <div class="stat-box"><div class="stat-box__val" id="statEarned">—</div><div class="stat-box__label">NTC Earned</div></div>
      </div>

      <div class="profile-tabs">
        <button class="profile-tab active" data-tab="summary">Summary</button>
        <button class="profile-tab" data-tab="listings" id="tab-listings">My Listings</button>
        <button class="profile-tab" data-tab="purchases" id="tab-purchases">Purchases</button>
        <button class="profile-tab" data-tab="transactions" id="tab-transactions">Transactions</button>
        <button class="profile-tab" data-tab="referrals" id="tab-referrals">Referrals</button>
        <button class="profile-tab" data-tab="analytics" id="tab-analytics">Analytics</button>
        <button class="profile-tab" data-tab="card" id="tab-card">My Card</button>
      </div>

      <div class="tab-panel active" id="panel-summary">
        <div class="section-hd"><div class="section-hd__title">ACCOUNT OVERVIEW</div><div class="section-hd__line"></div></div>
        <div style="font-size:13px;font-weight:300;color:var(--text-dim);line-height:1.8;margin-bottom:20px;">
          Welcome back, ${esc(username)}. Your role is <strong style="color:var(--violet);">${roleLabels[role]||'Guest'}</strong>.
          You currently hold <strong style="color:var(--violet);">${balance} NTC</strong> in your wallet.
        </div>
        <div id="accessExpiryBlock"></div>
      </div>

      <div class="tab-panel" id="panel-listings">
        <div class="section-hd"><div class="section-hd__title">MY LISTINGS</div><div class="section-hd__line"></div></div>
        <div id="listingsContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-purchases">
        <div class="section-hd"><div class="section-hd__title">PURCHASES</div><div class="section-hd__line"></div></div>
        <div id="purchasesContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-transactions">
        <div class="section-hd"><div class="section-hd__title">TRANSACTIONS</div><div class="section-hd__line"></div></div>
        <div id="transactionsContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-referrals">
        <div class="section-hd"><div class="section-hd__title">REFERRALS</div><div class="section-hd__line"></div></div>
        <div id="referralsContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-analytics">
        <div class="section-hd"><div class="section-hd__title">SELLER ANALYTICS</div><div class="section-hd__line"></div></div>
        <div id="analyticsContainer"><div class="loading-state">Loading...</div></div>
      </div>

      <div class="tab-panel" id="panel-card">
        <div class="section-hd"><div class="section-hd__title">MY CARD</div><div class="section-hd__line"></div></div>
        <div id="cardContainer"></div>
      </div>`;

    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await supabase.auth.signOut();
      window.location.href = '../index.html';
    });

    document.querySelectorAll('.profile-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'listings') loadListings();
        if (tab.dataset.tab === 'purchases') loadPurchases();
        if (tab.dataset.tab === 'transactions') loadTransactions();
        if (tab.dataset.tab === 'analytics') loadAnalytics();
        if (tab.dataset.tab === 'referrals') loadReferrals();
        if (tab.dataset.tab === 'card') loadCard();
      });
    });

    // Check hash for direct tab
    const hash = window.location.hash.replace('#','');
    if (['listings','purchases','transactions'].includes(hash)) {
      document.querySelector(`[data-tab="${hash}"]`)?.click();
    }

    async function loadListings() {
      const { data } = await supabase.from('plugins').select('*').eq('user_id', userId).eq('is_deleted', false).order('created_at', { ascending: false });
      document.getElementById('statItems').textContent = (data||[]).length;
      const container = document.getElementById('listingsContainer');
      if (!data||!data.length) { container.innerHTML = '<div class="empty-state">No listings yet</div>'; return; }
      container.innerHTML = data.map(p => `
        <div class="item-row">
          <span class="item-row__type">${p.file_type||'plugin'}</span>
          <span class="item-row__title">${esc(p.title)}</span>
          <span class="item-row__price">${p.price_ntc===0?'Free':p.price_ntc+' NTC'}</span>
          <span class="item-row__date">↓ ${p.download_count||0}</span>
          <span class="item-row__date">${new Date(p.created_at).toLocaleDateString()}</span>
        </div>`).join('');
    }

    async function loadPurchases() {
      const { data } = await supabase.from('plugin_purchases').select('*, plugins(title, file_type, price_ntc)').eq('user_id', userId).order('created_at', { ascending: false });
      document.getElementById('statPurchases').textContent = (data||[]).length;
      const container = document.getElementById('purchasesContainer');
      if (!data||!data.length) { container.innerHTML = '<div class="empty-state">No purchases yet</div>'; return; }
      container.innerHTML = data.map(p => `
        <div class="item-row">
          <span class="item-row__type">${p.plugins?.file_type||'item'}</span>
          <span class="item-row__title">${esc(p.plugins?.title||'Unknown item')}</span>
          <span class="item-row__price">${p.price_paid===0?'Free':p.price_paid+' NTC'}</span>
          <span class="item-row__date">${new Date(p.created_at).toLocaleDateString()}</span>
        </div>`).join('');
    }

    async function loadTransactions() {
      const { data } = await supabase.from('transactions').select('*').eq('user_id', userId).order('created_at', { ascending: false });
      const earned = (data||[]).filter(t=>t.amount>0).reduce((a,b)=>a+(b.amount||0),0);
      document.getElementById('statEarned').textContent = earned;
      const container = document.getElementById('transactionsContainer');
      if (!data||!data.length) { container.innerHTML = '<div class="empty-state">No transactions yet</div>'; return; }
      container.innerHTML = data.map(t => `
        <div class="tx-row">
          <span class="tx-amount ${t.amount>=0?'positive':'negative'}">${t.amount>=0?'+':''}${t.amount} NTC</span>
          <span class="tx-desc">${esc(t.description||t.type||'')}</span>
          <span class="tx-date">${new Date(t.created_at).toLocaleDateString()}</span>
        </div>`).join('');
    }

    // ── ACCESS EXPIRY COUNTDOWN ──────────────────────────────────
    async function loadAccessExpiry() {
      const { data: roleRow } = await supabase
        .from('user_roles')
        .select('access_expires_at')
        .eq('user_id', userId)
        .single();

      const expiresAt = roleRow?.access_expires_at ? new Date(roleRow.access_expires_at) : null;
      const block     = document.getElementById('accessExpiryBlock');
      if (!block) return;

      if (!expiresAt) {
        block.innerHTML = `
          <div style="background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));padding:16px 20px;display:flex;align-items:center;gap:14px;">
            <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;color:var(--text-faint);">ACCESS STATUS</div>
            <div style="font-family:var(--font-mono);font-size:11px;color:#39FF80;letter-spacing:.1em;">◉ No expiry set — contact operator</div>
          </div>`;
        return;
      }

      const now      = new Date();
      const msLeft   = expiresAt - now;
      const expired  = msLeft <= 0;
      const daysLeft = Math.ceil(msLeft / (1000 * 60 * 60 * 24));
      const warning  = !expired && daysLeft <= 3;

      const statusColor = expired ? 'var(--red-alert)' : warning ? '#FFE600' : '#39FF80';
      const statusText  = expired
        ? '⚠ Expired — contact @bxserkk to renew'
        : warning
          ? `⚠ Expires in ${daysLeft} day${daysLeft===1?'':'s'}`
          : `◉ Active`;

      block.innerHTML = `
        <div style="background:var(--bg-surface);border:1px solid ${expired?'rgba(255,34,80,.3)':warning?'rgba(255,230,0,.3)':'var(--border)'};clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));padding:16px 20px;margin-bottom:16px;">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
            <div>
              <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:6px;">Access Expiry</div>
              <div style="font-family:var(--font-mono);font-size:11px;color:${statusColor};letter-spacing:.1em;">${statusText}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:var(--font-display);font-size:28px;letter-spacing:.06em;color:${statusColor};line-height:1;" id="expiryCountdown">${expired?'—':formatCountdown(msLeft)}</div>
              <div style="font-family:var(--font-mono);font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);margin-top:2px;">${expired?'EXPIRED':daysLeft+' days remaining'}</div>
            </div>
          </div>
          ${warning||expired?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:10px;color:var(--text-faint);">DM <span style="color:var(--violet);">@bxserkk</span> on Discord to renew your access slot.</div>`:''}
        </div>`;

      // Live countdown ticker
      if (!expired) {
        setInterval(() => {
          const remaining = expiresAt - new Date();
          const el = document.getElementById('expiryCountdown');
          if (el && remaining > 0) el.textContent = formatCountdown(remaining);
        }, 1000);
      }
    }

    function formatCountdown(ms) {
      const totalSec = Math.floor(ms / 1000);
      const d = Math.floor(totalSec / 86400);
      const h = Math.floor((totalSec % 86400) / 3600);
      const m = Math.floor((totalSec % 3600) / 60);
      const s = totalSec % 60;
      if (d > 0) return `${d}d ${h}h ${m}m`;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    // Kick off expiry load immediately on profile render
    loadAccessExpiry();

    // ── REFERRALS ─────────────────────────────────────────────────
    async function loadReferrals() {
      const container = document.getElementById('referralsContainer');
      if (!container) return;

      // Get or generate referral code
      let { data: profileData } = await supabase
        .from('profiles')
        .select('referral_code')
        .eq('user_id', userId)
        .single();

      let refCode = profileData?.referral_code;

      if (!refCode) {
        const base = (username||'nkt').toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,8);
        refCode = base + Math.random().toString(36).slice(2,6);
        await supabase.from('profiles').upsert({ user_id: userId, referral_code: refCode });
      }

      const refLink = `${window.location.origin}/pages/pricing.html?ref=${refCode}`;

      // Load referrals made by this user
      const { data: referrals } = await supabase
        .from('referrals')
        .select('*')
        .eq('referrer_id', userId)
        .order('created_at', { ascending: false });

      const refs       = referrals || [];
      const totalEarned = refs.filter(r => r.status === 'paid').reduce((a,b) => a + (b.reward_ntc||0), 0);
      const pending    = refs.filter(r => r.status === 'pending').length;

      container.innerHTML = `
        <style>
          .ref-link-box{background:var(--bg-surface);border:1px solid var(--border-mid);clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));padding:20px;margin-bottom:20px;}
          .ref-link-label{font-family:var(--font-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px;}
          .ref-link-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
          .ref-link-input{flex:1;background:var(--bg-elevated);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:11px;padding:10px 14px;outline:none;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);min-width:0;letter-spacing:.04em;}
          .ref-copy-btn{padding:10px 20px;background:var(--violet);border:none;color:#fff;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);transition:background .18s;white-space:nowrap;}
          .ref-copy-btn:hover{background:#7B18DF;}
          .ref-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px;}
          .ref-stat{background:var(--bg-surface);border:1px solid var(--border);clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%);padding:16px;text-align:center;}
          .ref-stat__val{font-family:var(--font-display);font-size:28px;letter-spacing:.06em;color:var(--violet);line-height:1;margin-bottom:4px;}
          .ref-stat__label{font-family:var(--font-mono);font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);}
          .ref-copied{font-family:var(--font-mono);font-size:9px;color:var(--cyan);opacity:0;transition:opacity .3s;margin-left:8px;}
          .ref-copied.show{opacity:1;}
        </style>

        <div class="ref-link-box">
          <div class="ref-link-label">Your Referral Link</div>
          <div class="ref-link-row">
            <input class="ref-link-input" id="refLinkInput" value="${refLink}" readonly />
            <button class="ref-copy-btn" id="refCopyBtn">Copy Link</button>
            <span class="ref-copied" id="refCopied">Copied!</span>
          </div>
          <div style="margin-top:10px;font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;color:var(--text-faint);">
            When someone joins using your link and gets a slot, you earn <span style="color:var(--violet);">50 NTC</span> automatically.
          </div>
        </div>

        <div class="ref-stats-row">
          <div class="ref-stat"><div class="ref-stat__val">${refs.length}</div><div class="ref-stat__label">Total Referrals</div></div>
          <div class="ref-stat"><div class="ref-stat__val">${totalEarned}</div><div class="ref-stat__label">NTC Earned</div></div>
          <div class="ref-stat"><div class="ref-stat__val">${pending}</div><div class="ref-stat__label">Pending</div></div>
        </div>

        ${refs.length ? `
          <div style="font-family:var(--font-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;">Referral History</div>
          ${refs.map(r => `
            <div class="tx-row">
              <span class="tx-amount ${r.status==='paid'?'positive':''}" style="${r.status==='pending'?'color:var(--text-faint);':''}">${r.status==='paid'?'+'+r.reward_ntc+' NTC':'Pending'}</span>
              <span class="tx-desc">${r.type==='license'?'Slot referral':'NTC purchase referral'}</span>
              <span class="tx-date">${new Date(r.created_at).toLocaleDateString()}</span>
            </div>`).join('')}
        ` : `<div class="empty-state">No referrals yet — share your link to start earning</div>`}`;

      document.getElementById('refCopyBtn')?.addEventListener('click', async () => {
        const input = document.getElementById('refLinkInput');
        input.select();
        try {
          await navigator.clipboard.writeText(refLink);
        } catch {
          document.execCommand('copy');
        }
        const copied = document.getElementById('refCopied');
        copied.classList.add('show');
        setTimeout(() => copied.classList.remove('show'), 2000);
      });
    }

    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    // ── CLOUT CARD ──────────────────────────────────────────────
    async function loadCard() {
      const container = document.getElementById('cardContainer');
      if (!container) return;

      // Pull extra data for the card
      const [listingsRes, purchasesRes] = await Promise.all([
        supabase.from('plugins').select('id', { count: 'exact' }).eq('user_id', userId).eq('is_deleted', false),
        supabase.from('plugin_purchases').select('id', { count: 'exact' }).eq('user_id', userId),
      ]);

      const listings  = listingsRes.count  ?? 0;
      const purchases = purchasesRes.count ?? 0;
      const memberSince = new Date(session.user.created_at).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });

      const roleColors = {
        admin:     '#00F0FF',
        moderator: '#39FF80',
        premium:   '#9B30FF',
        member:    'rgba(242,242,248,0.52)',
        guest:     'rgba(242,242,248,0.22)',
      };
      const roleColor = roleColors[role] || roleColors.guest;

      container.innerHTML = `
        <style>
          .card-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 8px 0 32px;
          }
          .card-hint {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-faint);
            text-align: center;
          }
          #profileCanvas {
            max-width: 100%;
            border: 1px solid var(--border-mid);
            box-shadow: 0 8px 48px rgba(0,0,0,0.7), 0 0 60px rgba(155,48,255,0.1);
            display: block;
          }
          .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
          }
          .card-btn {
            padding: 11px 28px;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(6px 0, 100% 0, calc(100% - 6px) 100%, 0 100%);
            border: none;
            transition: all 0.18s;
          }
          .card-btn--primary { background: var(--violet); color: #fff; }
          .card-btn--primary:hover { background: #7B18DF; }
          .card-btn--outline { background: transparent; border: 1px solid var(--border-mid); color: var(--text-dim); }
          .card-btn--outline:hover { border-color: var(--violet-dim); color: var(--violet); }
          .card-copied {
            font-family: var(--font-mono);
            font-size: 9px;
            letter-spacing: 0.14em;
            color: var(--cyan);
            opacity: 0;
            transition: opacity 0.3s;
          }
          .card-copied.show { opacity: 1; }
        </style>
        <div class="card-wrap">
          <p class="card-hint">◈ Your Nokturne member card — screenshot &amp; flex it</p>
          <canvas id="profileCanvas" width="680" height="360"></canvas>
          <div class="card-actions">
            <button class="card-btn card-btn--primary" id="downloadCardBtn">↓ Save Image</button>
            <button class="card-btn card-btn--outline" id="copyCardBtn">⧉ Copy Image</button>
          </div>
          <span class="card-copied" id="cardCopied">Copied to clipboard</span>
        </div>`;

      // Draw after DOM settles
      await new Promise(r => setTimeout(r, 50));
      drawCard({
        canvas: document.getElementById('profileCanvas'),
        username, role, balance, avatarUrl,
        memberSince, listings, purchases,
        roleColor,
      });

      document.getElementById('downloadCardBtn').addEventListener('click', () => {
        const canvas = document.getElementById('profileCanvas');
        const a = document.createElement('a');
        a.download = `nokturne-${username.toLowerCase().replace(/\s+/g,'-')}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      });

      document.getElementById('copyCardBtn').addEventListener('click', async () => {
        const canvas = document.getElementById('profileCanvas');
        canvas.toBlob(async blob => {
          try {
            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
            const el = document.getElementById('cardCopied');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2200);
          } catch { showToast('Copy not supported in this browser', true); }
        });
      });
    }

    function drawCard({ canvas, username, role, balance, avatarUrl, memberSince, listings, purchases, roleColor }) {
      const ctx  = canvas.getContext('2d');
      const W    = canvas.width;
      const H    = canvas.height;
      const DPR  = Math.min(window.devicePixelRatio || 1, 2);

      // Hi-DPI
      canvas.width  = W * DPR;
      canvas.height = H * DPR;
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(DPR, DPR);

      // ── Background ──
      const bg = ctx.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0,   '#080810');
      bg.addColorStop(0.5, '#0E0E18');
      bg.addColorStop(1,   '#0a0a14');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, W, H);

      // ── Violet glow blob ──
      const glow = ctx.createRadialGradient(W * 0.15, H * 0.35, 0, W * 0.15, H * 0.35, W * 0.45);
      glow.addColorStop(0,   'rgba(155,48,255,0.13)');
      glow.addColorStop(0.5, 'rgba(155,48,255,0.04)');
      glow.addColorStop(1,   'transparent');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);

      // ── Cyan glow blob (right) ──
      const glow2 = ctx.createRadialGradient(W * 0.85, H * 0.6, 0, W * 0.85, H * 0.6, W * 0.35);
      glow2.addColorStop(0,   'rgba(0,240,255,0.07)');
      glow2.addColorStop(1,   'transparent');
      ctx.fillStyle = glow2;
      ctx.fillRect(0, 0, W, H);

      // ── Grid lines ──
      ctx.strokeStyle = 'rgba(255,255,255,0.028)';
      ctx.lineWidth = 1;
      for (let x = 0; x < W; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      // ── Clip-path border (skewed corners) ──
      ctx.strokeStyle = 'rgba(155,48,255,0.45)';
      ctx.lineWidth = 1.5;
      const cut = 20;
      ctx.beginPath();
      ctx.moveTo(cut, 0);
      ctx.lineTo(W - cut, 0);
      ctx.lineTo(W, cut);
      ctx.lineTo(W, H - cut);
      ctx.lineTo(W - cut, H);
      ctx.lineTo(cut, H);
      ctx.lineTo(0, H - cut);
      ctx.lineTo(0, cut);
      ctx.closePath();
      ctx.stroke();

      // ── Corner accent dots ──
      [[cut, 0], [W - cut, 0], [W, cut], [0, cut], [cut, H], [W - cut, H], [W, H - cut], [0, H - cut]].forEach(([x, y]) => {
        ctx.fillStyle = '#9B30FF';
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      });

      // ── Top accent bar ──
      const topBar = ctx.createLinearGradient(0, 0, W, 0);
      topBar.addColorStop(0,   'transparent');
      topBar.addColorStop(0.3, 'rgba(155,48,255,0.6)');
      topBar.addColorStop(0.7, 'rgba(0,240,255,0.4)');
      topBar.addColorStop(1,   'transparent');
      ctx.fillStyle = topBar;
      ctx.fillRect(0, 0, W, 2);

      // ── NOKTURNE wordmark ──
      ctx.font = `700 11px "Fira Code", monospace`;
      ctx.fillStyle = 'rgba(155,48,255,0.7)';
      ctx.letterSpacing = '0.22em';
      ctx.fillText('NOKTURNE', 32, 30);

      // ── ◈ brand glyph (large, faint background) ──
      ctx.font = `bold 160px "Fira Code", monospace`;
      ctx.fillStyle = 'rgba(155,48,255,0.04)';
      ctx.fillText('◈', W - 180, H - 10);

      // ── Avatar circle ──
      const AX = 64, AY = 80, AR = 42;
      ctx.save();
      ctx.beginPath();
      ctx.arc(AX, AY, AR, 0, Math.PI * 2);
      ctx.clip();

      if (avatarUrl) {
        // Try to draw avatar image
        try {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.src = avatarUrl;
          // Draw placeholder first; image loads async — redraw on load
          ctx.fillStyle = '#141420';
          ctx.fillRect(AX - AR, AY - AR, AR * 2, AR * 2);
          img.onload = () => {
            ctx.save();
            ctx.beginPath();
            ctx.arc(AX, AY, AR, 0, Math.PI * 2);
            ctx.clip();
            ctx.drawImage(img, AX - AR, AY - AR, AR * 2, AR * 2);
            ctx.restore();
          };
        } catch (_) {}
      } else {
        ctx.fillStyle = '#141420';
        ctx.fillRect(AX - AR, AY - AR, AR * 2, AR * 2);
        ctx.restore();
        ctx.font = `bold 28px "Fira Code", monospace`;
        ctx.fillStyle = '#9B30FF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('◈', AX, AY);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
        ctx.save();
      }
      ctx.restore();

      // Avatar ring
      ctx.beginPath();
      ctx.arc(AX, AY, AR + 2, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(155,48,255,0.6)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // ── Username ──
      ctx.font = `700 32px "Bebas Neue", Impact, sans-serif`;
      ctx.fillStyle = '#F2F2F8';
      ctx.letterSpacing = '0.06em';
      ctx.fillText(username.toUpperCase(), 120, 72);

      // ── Role badge ──
      const roleLabel = { admin:'ADMIN', moderator:'MODERATOR', premium:'PREMIUM', member:'MEMBER', guest:'GUEST' }[role] || 'GUEST';
      ctx.font = `700 9px "Fira Code", monospace`;
      ctx.fillStyle = roleColor;
      const rl = ctx.measureText(roleLabel).width + 20;
      ctx.fillStyle = roleColor + '18';
      roundRect(ctx, 120, 82, rl, 18, 2);
      ctx.fill();
      ctx.strokeStyle = roleColor + '70';
      ctx.lineWidth = 1;
      roundRect(ctx, 120, 82, rl, 18, 2);
      ctx.stroke();
      ctx.fillStyle = roleColor;
      ctx.font = `700 9px "Fira Code", monospace`;
      ctx.fillText(roleLabel, 130, 95);

      // ── Member since ──
      ctx.font = `300 11px "Barlow", sans-serif`;
      ctx.fillStyle = 'rgba(242,242,248,0.35)';
      ctx.fillText(`Member since ${memberSince}`, 120, 115);

      // ── Divider ──
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(32, 142);
      ctx.lineTo(W - 32, 142);
      ctx.stroke();

      // ── Stats row ──
      const stats = [
        { label: 'NTC BALANCE', val: String(balance), color: '#9B30FF' },
        { label: 'LISTINGS',    val: String(listings),  color: '#00F0FF' },
        { label: 'PURCHASES',   val: String(purchases), color: '#F2F2F8' },
        { label: 'LISTINGS',    val: listings > 0 ? listings : '—',  color: '#00F0FF' },
      ];

      const statW = (W - 64) / stats.length;
      stats.forEach((s, i) => {
        const x = 32 + i * statW;
        const y = 165;

        // Stat box bg
        ctx.fillStyle = 'rgba(14,14,24,0.8)';
        ctx.strokeStyle = 'rgba(255,255,255,0.06)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.rect(x + 4, y - 6, statW - 8, 60);
        ctx.fill();
        ctx.stroke();

        // Value
        ctx.font = `700 22px "Bebas Neue", Impact, sans-serif`;
        ctx.fillStyle = s.color;
        ctx.textAlign = 'center';
        ctx.fillText(s.val, x + statW / 2, y + 24);

        // Label
        ctx.font = `400 8px "Fira Code", monospace`;
        ctx.fillStyle = 'rgba(242,242,248,0.28)';
        ctx.fillText(s.label, x + statW / 2, y + 40);
        ctx.textAlign = 'left';
      });

      // ── Top gain rank badge ──


      // ── Bottom bar ──
      const botBar = ctx.createLinearGradient(0, H - 2, W, H - 2);
      botBar.addColorStop(0,   'transparent');
      botBar.addColorStop(0.4, 'rgba(0,240,255,0.4)');
      botBar.addColorStop(0.7, 'rgba(155,48,255,0.5)');
      botBar.addColorStop(1,   'transparent');
      ctx.fillStyle = botBar;
      ctx.fillRect(0, H - 2, W, 2);

      // ── nokturne.gg watermark ──
      ctx.font = `400 10px "Fira Code", monospace`;
      ctx.fillStyle = 'rgba(242,242,248,0.15)';
      ctx.textAlign = 'right';
      ctx.fillText('nokturne.gg', W - 32, H - 20);
      ctx.textAlign = 'left';
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function getRankColor(rank) {
      if (!rank) return 'rgba(255,255,255,0.3)';
      const r = rank.toLowerCase();
      if (r.includes('supersonic'))   return '#FF0080';
      if (r.includes('grand champ'))  return '#FF4500';
      if (r.includes('champion'))     return '#9B30FF';
      if (r.includes('diamond'))      return '#00B4D8';
      if (r.includes('platinum'))     return '#00F0FF';
      if (r.includes('gold'))         return '#FFD700';
      if (r.includes('silver'))       return '#C0C0C0';
      if (r.includes('bronze'))       return '#CD7F32';
      return 'rgba(155,48,255,0.6)';
    }

    function showToast(msg, err = false) {
      // reuse existing toast if present, else create
      let t = document.getElementById('toast');
      if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:400;padding:12px 20px;background:var(--bg-elevated);border:1px solid var(--violet-dim);font-family:var(--font-mono);font-size:11px;color:var(--violet);display:none;'; document.body.appendChild(t); }
      t.textContent = msg;
      t.style.display = 'block';
      t.style.color = err ? 'var(--red-alert)' : 'var(--violet)';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }
  </script>
</body>
