<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Nokturne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&family=Fira+Code:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/main.css" />
  <style>
    html, body {
      height: 100%;
      overflow: hidden;
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 24px;
    }

    .login-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 60% 60% at 30% 40%, rgba(155,48,255,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 75% 65%, rgba(0,240,255,0.07) 0%, transparent 55%);
      z-index: 0;
    }

    .login-grid-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        -50deg, transparent, transparent 56px,
        rgba(155,48,255,0.012) 56px, rgba(155,48,255,0.012) 57px
      );
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--bg-surface);
      border: 1px solid var(--border-mid);
      clip-path: polygon(0 0, calc(100% - 24px) 0, 100% 24px, 100% 100%, 24px 100%, 0 calc(100% - 24px));
      box-shadow: 0 0 60px rgba(155,48,255,0.12), 0 24px 80px rgba(0,0,0,0.6);
    }

    .login-card__head {
      padding: 36px 36px 28px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      background: linear-gradient(135deg, rgba(155,48,255,0.08) 0%, transparent 60%);
    }

    .login-card__logo {
      height: 48px;
      width: auto;
      margin: 0 auto 20px;
      display: block;
    }

    .login-card__title {
      font-family: var(--font-display);
      font-size: 32px;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .login-card__sub {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 300;
      line-height: 1.6;
    }

    .login-card__body {
      padding: 32px 36px 36px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .login-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .login-status__key { color: var(--text-faint); display: flex; align-items: center; gap: 8px; }
    .login-status__key::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--cyan); animation: pulse 2s ease-in-out infinite;
    }
    .login-status__val { color: var(--cyan); }

    .btn-discord {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      padding: 16px 24px;
      background: #5865F2;
      color: white;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-discord:hover {
      background: #4752C4;
      box-shadow: 0 0 30px rgba(88,101,242,0.4);
      transform: translateY(-1px);
    }
    .btn-discord:active { transform: translateY(0); }
    .btn-discord svg { flex-shrink: 0; }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-faint);
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .login-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-faint);
      font-weight: 300;
      line-height: 1.7;
    }
    .login-note a {
      color: var(--violet);
      text-decoration: none;
    }
    .login-note a:hover { text-decoration: underline; }

    .login-error {
      display: none;
      padding: 12px 16px;
      background: rgba(255,34,80,0.08);
      border: 1px solid rgba(255,34,80,0.3);
      color: #FF2250;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      clip-path: polygon(4px 0, 100% 0, calc(100% - 4px) 100%, 0 100%);
    }
    .login-error.show { display: block; }

    .login-loading {
      display: none;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--violet);
      padding: 4px 0;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .login-loading.show { display: block; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="login-bg"      aria-hidden="true"></div>
  <div class="login-grid-bg" aria-hidden="true"></div>

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-card__head">
        <img src="../assets/images/nokturne-banner.png" alt="Nokturne" class="login-card__logo" />
        <div class="login-card__title">MEMBER ACCESS</div>
        <p class="login-card__sub">Sign in with your Discord account to access the community forum and premium features.</p>
      </div>

      <div class="login-card__body">

        <div class="login-status">
          <span class="login-status__key">Auth System</span>
          <span class="login-status__val">Online</span>
        </div>

        <div id="loginError" class="login-error"></div>
        <div id="loginLoading" class="login-loading">Redirecting to Discord...</div>

        <button id="discordBtn" class="btn-discord">
          <!-- Discord logo SVG -->
          <svg width="20" height="20" viewBox="0 0 71 55" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M60.1045 4.8978C55.5792 2.8214 50.7265 1.2916 45.6527 0.41542C45.5603 0.39851 45.468 0.440769 45.4204 0.525289C44.7963 1.6353 44.105 3.0834 43.6209 4.2216C38.1637 3.4046 32.7345 3.4046 27.3892 4.2216C26.905 3.0581 26.1886 1.6353 25.5617 0.525289C25.5141 0.443589 25.4218 0.40133 25.3294 0.41542C20.2584 1.2888 15.4057 2.8186 10.8776 4.8978C10.8384 4.9147 10.8048 4.9429 10.7825 4.9795C1.57795 18.7309 -0.943561 32.1443 0.293408 45.3914C0.299005 45.4562 0.335386 45.5182 0.385761 45.5576C6.45866 50.0174 12.3413 52.7249 18.1147 54.5195C18.2071 54.5477 18.305 54.5139 18.3638 54.4378C19.7295 52.5728 20.9469 50.6063 21.9907 48.5383C22.0523 48.4172 21.9935 48.2735 21.8676 48.2256C19.9366 47.4931 18.0979 46.6 16.3292 45.5858C16.1893 45.5041 16.1781 45.304 16.3068 45.2082C16.679 44.9293 17.0513 44.6391 17.4067 44.3461C17.471 44.2926 17.5606 44.2813 17.6362 44.3151C29.2558 49.6202 41.8354 49.6202 53.3179 44.3151C53.3935 44.2785 53.4831 44.2898 53.5502 44.3433C53.9057 44.6363 54.2779 44.9293 54.6529 45.2082C54.7816 45.304 54.7732 45.5041 54.6333 45.5858C52.8646 46.6197 51.0259 47.4931 49.0921 48.2228C48.9662 48.2707 48.9102 48.4172 48.9718 48.5383C50.038 50.6034 51.2554 52.5699 52.5959 54.435C52.6519 54.5139 52.7526 54.5477 52.845 54.5195C58.6464 52.7249 64.529 50.0174 70.6019 45.5576C70.6551 45.5182 70.6887 45.459 70.6943 45.3942C72.1747 30.0791 68.2147 16.7757 60.1968 4.9823C60.1772 4.9429 60.1437 4.9147 60.1045 4.8978ZM23.7259 37.3253C20.2276 37.3253 17.3451 34.1136 17.3451 30.1693C17.3451 26.225 20.1717 23.0133 23.7259 23.0133C27.308 23.0133 30.1626 26.2532 30.1066 30.1693C30.1066 34.1136 27.28 37.3253 23.7259 37.3253ZM47.3178 37.3253C43.8196 37.3253 40.9371 34.1136 40.9371 30.1693C40.9371 26.225 43.7636 23.0133 47.3178 23.0133C50.9 23.0133 53.7545 26.2532 53.6986 30.1693C53.6986 34.1136 50.9 37.3253 47.3178 37.3253Z" fill="white"/>
          </svg>
          Continue with Discord
        </button>

        <div class="login-divider">members only</div>

        <p class="login-note">
          Access is invite-only. If you don't have access yet,<br>
          contact <a href="https://discord.gg/a4yxzKzPbx" target="_blank" rel="noopener noreferrer">@bxserkk on Discord</a> to request a slot.
        </p>

      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://mmovqnaeozhzzeazrgdm.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_CPoq9v6zAGVfRH4scFbxcA_gMRX4FJs';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // If already logged in, go straight to forum
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      await processReferral(supabase, session);
      window.location.href = 'forum.html';
    }

    // Handle referral on OAuth redirect (runs when Discord sends user back)
    supabase.auth.onAuthStateChange(async (event, newSession) => {
      if (event === 'SIGNED_IN' && newSession) {
        await processReferral(supabase, newSession);
      }
    });

    async function processReferral(supabase, session) {
      const pendingRef = localStorage.getItem('pending_referral');
      if (!pendingRef) return;
      const userId = session.user.id;
      try {
        const { data: referrer } = await supabase
          .from('profiles').select('id').eq('referral_code', pendingRef).single();
        if (referrer && referrer.id !== userId) {
          // Only insert if not already referred
          const { data: existing } = await supabase
            .from('referrals').select('id').eq('referee_id', userId).maybeSingle();
          if (!existing) {
            await supabase.from('referrals').insert({
              referrer_id: referrer.id,
              referee_id: userId,
              type: 'license',
              status: 'pending'
            });
          }
        }
      } catch(e) { /* silently fail */ }
      localStorage.removeItem('pending_referral');
    }

    // Discord login
    document.getElementById('discordBtn').addEventListener('click', async () => {
      const btn      = document.getElementById('discordBtn');
      const loading  = document.getElementById('loginLoading');
      const errorBox = document.getElementById('loginError');

      btn.style.display     = 'none';
      loading.classList.add('show');
      errorBox.classList.remove('show');

      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'discord',
        options: {
          redirectTo: window.location.origin + '/pages/forum.html'
        }
      });

      if (error) {
        btn.style.display = 'flex';
        loading.classList.remove('show');
        errorBox.textContent = 'Error: ' + error.message;
        errorBox.classList.add('show');
      }
    });
  </script>

</body>
</html>
